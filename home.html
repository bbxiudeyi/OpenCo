<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .logo {
            font-size: 2rem;
            font-weight: 400;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="logo">OpenCo</div>
    <script>
        // 检查是否已登录
        const supabaseUrl = 'https://uaratgwzqibizspmnfnz.supabase.co';
        const supabaseKey = 'sb_publishable_5t9f8ygbxBNAIX_Xysdm4A_mbJCCGFp';
        
        if (window.supabase) {
            const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
            
            supabase.auth.getSession().then(({ data: { session } }) => {
                if (!session) {
                    // 未登录，跳回登录页
                    window.location.href = 'index.html';
                }
            });
        }
    </script>
</body>
</html>
